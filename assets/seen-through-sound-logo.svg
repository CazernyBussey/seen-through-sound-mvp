<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" role="img" aria-labelledby="title desc">
  <title id="title">Seen Through Sound logo</title>
  <desc id="desc">A gold globe medallion with bold ETIB initials, a clear eye-shaped emblem above the lettering, and a blue banner reading Seen Through Sound.</desc>
  <defs>
    <radialGradient id="gold" cx="43%" cy="32%" r="68%">
      <stop offset="0" stop-color="#ffe761"/>
      <stop offset="0.48" stop-color="#ffd51f"/>
      <stop offset="1" stop-color="#d6a300"/>
    </radialGradient>
    <radialGradient id="innerGold" cx="42%" cy="35%" r="64%">
      <stop offset="0" stop-color="#ffe875"/>
      <stop offset="0.7" stop-color="#f5c900"/>
      <stop offset="1" stop-color="#b98c00"/>
    </radialGradient>
    <linearGradient id="banner" x1="150" y1="650" x2="850" y2="650">
      <stop offset="0" stop-color="#243c96"/>
      <stop offset="0.5" stop-color="#102a7d"/>
      <stop offset="1" stop-color="#071f66"/>
    </linearGradient>
    <filter id="drop" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="10" dy="13" stdDeviation="5" flood-color="#020617" flood-opacity="0.42"/>
    </filter>
  </defs>

  <circle cx="500" cy="500" r="465" fill="url(#gold)" filter="url(#drop)"/>
  <circle cx="500" cy="500" r="410" fill="url(#innerGold)" opacity="0.72"/>
  <circle cx="500" cy="500" r="405" fill="none" stroke="#7b5e00" stroke-width="7" opacity="0.45"/>
  <circle cx="500" cy="500" r="438" fill="none" stroke="#ffef83" stroke-width="5" opacity="0.33"/>

  <g fill="#7a5e00" opacity="0.24">
    <path d="M190 280c55-77 151-124 255-119 130 7 237 109 252 235 11 96-29 184-96 238 12-44-2-77-46-107-42-28-32-80 11-108 39-25 52-73 26-111-24-36-79-32-119-14-69 31-109-5-125-48-16-42-75-46-158 34z"/>
    <path d="M706 169c72 40 128 101 159 176-67-10-119 8-145 47-30 45 10 94 60 107 43 12 78 45 62 94-15 50-67 73-124 65 40-74 43-134 10-195-36-68-24-142-22-294z"/>
    <path d="M408 695c48 32 102 40 161 30-15 36-36 71-65 104-18 21-11 60-39 70-30 11-53-26-40-70 13-41 22-81-17-134z"/>
    <path d="M290 456c38-8 67 5 77 40 10 32 45 47 76 35 34-13 68 8 73 42 5 39-30 69-77 71-84 4-142-53-149-188z"/>
  </g>

  <g aria-hidden="true">
    <path d="M500 222c56 0 95 31 132 62-37 31-76 62-132 62s-95-31-132-62c37-31 76-62 132-62z" fill="#000000"/>
    <ellipse cx="500" cy="284" rx="48" ry="47" fill="#f8fafc"/>
    <circle cx="500" cy="284" r="28" fill="#000000"/>
    <circle cx="515" cy="268" r="9" fill="#f8fafc"/>
  </g>

  <g fill="#000000">
    <text x="500" y="617" text-anchor="middle" font-family="Arial Black, Impact, sans-serif" font-size="338" font-weight="900" letter-spacing="-22">ETIB</text>
  </g>

  <rect x="150" y="651" width="700" height="75" rx="38" fill="url(#banner)"/>
  <rect x="185" y="661" width="630" height="15" rx="8" fill="#ffffff" opacity="0.12"/>
  <text x="500" y="705" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-size="47" font-weight="900" fill="#f8fafc" letter-spacing="10">SEEN THROUGH SOUND</text>
</svg>
